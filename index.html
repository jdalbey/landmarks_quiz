<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landmark Identification Quiz</title>
    <meta name="author" content="John Dalbey">
    <meta name="copyright" content="© 2025 John Dalbey">
    <meta name="license" content="MIT License">
    <meta name="version" content="2025.07.21-a">
    <style>
        body {
            font-family: Verdana, sans-serif;
            font-size: 12px;
            margin: 20px;
            background-color: #f0f0f0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border: 1px solid #ccc;
        }

        /* Modified header layout - H1 left, selector right, same line */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 18px;
            margin: 0;
        }

        .lookout-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .lookout-selector label {
            font-weight: bold;
        }

        .lookout-selector select {
            font-family: Verdana, sans-serif;
            font-size: 12px;
            padding: 5px;
        }

        .controls {
            text-align: center;
            margin-bottom: 20px;
        }
/* The 420px gives the 380px image room plus the 10px top/bottom padding. If you find images are still taller than the container, increase height slightly or reduce max-height on .quiz-image to match — the key is that height on the container must be set so the layout below it doesn't reflow when images change.*/
        .image-container {
            text-align: center;
            margin: 20px 0;
            border: 1px solid #999;
            padding: 10px;
            height: 400px;
            overflow: hidden;    /* prevent overflow if image is taller */
            background-color: #fafafa;
            display: flex;
            align-items: flex-start;
            gap: 20px;
        }

        .image-section {
            flex: 1;
            text-align: center;
        }

        .quiz-image {
            max-width: 100%;
            max-height: 380px;
            object-fit: contain; /* images scale down to fit without distorting */
        }

        .info-section {
            flex: 0 0 200px;
            text-align: left;
            padding: 10px;
            background-color: #f5f5f5;
            border: 1px solid #ddd;
        }

        .info-item {
            margin-bottom: 10px;
            font-size: 13px;
        }

        .info-label {
            font-weight: bold;
            display: block;
        }

        .options {
            margin: 20px 0;
        }

        .options-label {
            font-weight: bold;
            margin-bottom: 10px;
        }

        .options-row {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .option {
            font-size: 14px;
        }

        .option input[type="radio"] {
            margin-right: 8px;
        }

        .buttons {
            text-align: center;
            margin-top: 5px;
        }

        .buttons button {
            margin: 0 5px;
            padding: 8px 16px;
            font-family: Verdana, sans-serif;
            font-size: 12px;
        }

        .user-response {
            margin: 10px 0;
            padding: 5px;
        }

        /* Modified response sections - labels and widgets on same line */
        .response-section {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            gap: 15px;
        }

        .response-label {
            font-weight: bold;
            min-width: 140px;
            flex-shrink: 0;
        }

        .response-content {
            flex: 1;
        }

        .common-name-input {
            width: 275px;
            padding: 5px;
            font-family: Verdana, sans-serif;
            font-size: 12px;
        }

        .continent-checkboxes {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .continent-option {
            font-size: 12px;
        }

        .continent-option input[type="checkbox"],
        .continent-option input[type="radio"] {
            margin-right: 8px;
        }

        .correct-answer {
            background-color: #ffff99;
            padding: 10px;
            border: 1px solid #cccc00;
            margin: 10px 0;
            font-weight: bold;
            float: right;
        }

        hr {
            margin: 20px 0;
        }


        /* If we're on a mobile device (narrow screen), show correct answer above
           response area instead of to the right. */
        @media screen and (max-width: 768px) {
            .correct-answer {
                float: none;
                margin-bottom: 20px;
            }
            /* Decrease width of name input field */
            .common-name-input {
                width: 175px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Modified header: H1 left, lookout selector right -->
        <div class="header">
            <h1>Landmark Identification Quiz</h1>
            <div class="lookout-selector">
                <label for="lookoutSelect">Lookout:</label>
                <select id="lookoutSelect" onchange="changeLookout()">
                    <option value="Delilah">Delilah</option>
                    <option value="Park Ridge">Park Ridge</option>
                    <option value="Buck Rock">Buck Rock</option>
                </select>
            </div>
        </div>
        
        <div class="image-container">
            <div class="image-section">
                <img id="quizImage" class="quiz-image" src="" alt="Quiz item" style="display: none;">
                <div id="loadingText">Loading...</div>
            </div>
            <div class="info-section">
                <div class="info-item">
                    <span class="info-label">Description:</span>
                    <span id="infoDescription">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Azimuth:</span>
                    <span id="infoAzimuth">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Distance:</span>
                    <span id="infoDistance">-</span>
                </div>
            </div>
        </div>

            <div id="correctAnswer" class="correct-answer" style="display: none;"></div>

        <!-- Modified user response: labels and widgets on same line -->
        <div class="user-response">
            <div class="response-section">
                <div class="response-label">Geographic Name?</div>
                <div class="response-content">
                    <input type="text" id="commonNameInput" class="common-name-input" placeholder="Enter geographic name">
                </div>
            </div>
            
            <div class="response-section">
                <div class="response-label">Agency Jurisdiction?</div>
                <div class="response-content">
                    <div class="continent-checkboxes">
                        <div class="continent-option">
                            <input type="radio" id="sqf" name="agency" value="SQF">
                            <label for="sqf">SQF</label>
                        </div>
                        <div class="continent-option">
                            <input type="radio" id="snf" name="agency" value="SNF">
                            <label for="snf">SNF</label>
                        </div>
                        <div class="continent-option">
                            <input type="radio" id="seki" name="agency" value="SEKI">
                            <label for="seki">SEKI</label>
                        </div>
                        <div class="continent-option">
                            <input type="radio" id="sra" name="agency" value="SRA">
                            <label for="sra">SRA</label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="response-section">
                <div class="response-label">Report to?</div>
                <div class="response-content">
                    <div class="continent-checkboxes">
                        <div class="continent-option">
                            <input type="checkbox" id="porterville" name="reportTo" value="Porterville">
                            <label for="porterville">Porterville</label>
                        </div>
                        <div class="continent-option">
                            <input type="checkbox" id="sierra" name="reportTo" value="Sierra">
                            <label for="sierra">Sierra</label>
                        </div>
                        <div class="continent-option">
                            <input type="checkbox" id="ashmtn" name="reportTo" value="Ash Mtn">
                            <label for="ashmtn">Ash Mtn</label>
                        </div>
                        <div class="continent-option">
                            <input type="checkbox" id="none" name="reportTo" value="None">
                            <label for="none">None</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="buttons">
            <button id="prevBtn" onclick="previousItem()">Previous</button>
            <button id="revealBtn" onclick="revealAnswer()">Reveal Answer</button>
            <button id="resetBtn" onclick="resetAnswer()" style="display: none;">Reset</button>
            <button id="nextBtn" onclick="nextItem()">Next</button>
        </div>

        <div class="controls">
            <strong>Page <span id="pageCounter">1/7</span></strong>
            &nbsp;&nbsp;&nbsp;
            <input type="checkbox" id="randomizeCheckbox" onchange="toggleMode()">
            <label for="randomizeCheckbox">Randomize</label>
        </div>

    </div>

    <script>
        // Quiz data - Refactored structure with lookout as key
        const quizData = {
            "Delilah": [
                { image: "images/tivy_mtn.png", agency: "SRA", description: "mountain", azimuth: "268° 55'", distance: "13.25 mi", geographicName: "Tivy Mountain", reportTo: "Porterville" },
                { image: "images/piedra_silo.png", agency: "SRA", description: "Silo", azimuth: "258.3°", distance: "19 mi", geographicName: "Silo (Piedra Road)", reportTo: "None" },
                { image: "images/boat_dock.png", agency: "SNF", description: "Boat Dock", azimuth: "292.9°? ", distance: "11.3 mi", geographicName: "Boat Dock", reportTo: "Sierra" },
                { image: "images/ranch_on_12S19.png", agency: "SRA", description: "Ranch", azimuth: "293°?", distance: "4 mi", geographicName: "Ranch on FS road 12S19", reportTo: "Porterville" },
                { image: "images/finger_rock.png", agency: "SNF", description: "Pointy rock", azimuth: "41° 25'", distance: "17.5 mi", geographicName: "Finger Rock", reportTo: "Sierra" },
                { image: "images/manzanita_patch.png", agency: "SEKI", description: "Manzanita patch", azimuth: "114° 50'?", distance: "10.3 mi", geographicName: "Park Ridge", reportTo: "Ash Mtn?" },
                { image: "images/eshom_point.png", agency: "SQF", description: "knob", azimuth: "140° 10'", distance: "15.25 mi", geographicName: "Eshom Point", reportTo: "Porterville" },
        { image: "images/big_baldy.jpg", agency: "", description: "granite dome", azimuth: "", distance: "", geographicName: "Big Baldy", reportTo: "" },
        { image: "images/hwy180_roadcut.jpg", agency: "", description: "road cut", azimuth: "", distance: "", geographicName: "Hwy 180 w. of 245 jct", reportTo: "" },
        { image: "images/mcgee_overlook.jpg", agency: "", description: "road cut/vista pt", azimuth: "", distance: "", geographicName: "McGee Overlook", reportTo: "" },
        { image: "images/MtHarrington.png", agency: "", description: "mountain", azimuth: "", distance: "", geographicName: "Mt. Harrington", reportTo: "" },
        { image: "images/sequoia_highlands_cabin.png", agency: "", description: "cabin", azimuth: "", distance: "", geographicName: "Sequoia Highland Camp", reportTo: "" },
        { image: "images/sheeps_head.jpg", agency: "", description: "low granite dome", azimuth: "", distance: "", geographicName: "Sheep's Head", reportTo: "" },
                { image: "images/bear_mtn_tuu.jpg", agency: "", description: "mountain/ridge", azimuth: "", distance: "", geographicName: "Bear Mtn (TUU)", reportTo: "" },
                { image: "images/bear_wallow.png", agency: "", description: "oak grove", azimuth: "", distance: "", geographicName: "Bear Wallow", reportTo: "" },
                { image: "images/davis_jct.jpg", agency: "", description: "road junction", azimuth: "", distance: "", geographicName: "Davis 'Y'", reportTo: "" },
                { image: "images/four_radio_towers.jpg", agency: "", description: "4 radio towers", azimuth: "", distance: "", geographicName: "4 radio towers", reportTo: "" },
                { image: "images/garlic_spur_crag.jpg", agency: "", description: "crag on ridge", azimuth: "", distance: "", geographicName: "Garlic Spur", reportTo: "" },
                { image: "images/granite_hill.png", agency: "", description: "grassy hill", azimuth: "", distance: "", geographicName: "Granite Hill", reportTo: "" },
                { image: "images/white_fence_ranch.png", agency: "", description: "white fence ranch", azimuth: "", distance: "", geographicName: "white fence ranch", reportTo: "" },
                { image: "images/hills_valley_hwy63.png", agency: "", description: "valley", azimuth: "", distance: "", geographicName: "Hills Valley (Hwy 63)", reportTo: "" },
                { image: "images/hogans_hill.png", agency: "", description: "metal roofed house", azimuth: "", distance: "", geographicName: "Hogan's Hill", reportTo: "" },
                { image: "images/hwy180xKernFriant.png", agency: "", description: "road (not visible)", azimuth: "", distance: "", geographicName: "Hwy 180 x Kern/Friant Canal", reportTo: "" },
                { image: "images/jesse_morrow_mtn.png", agency: "", description: "mountain", azimuth: "", distance: "", geographicName: "Jesse Morrow Mountain", reportTo: "" },
                { image: "images/logger_pt.png", agency: "", description: "point", azimuth: "", distance: "", geographicName: "Logger Point", reportTo: "" },
                { image: "images/oat_mtn.png", agency: "", description: "mountain", azimuth: "", distance: "", geographicName: "Oak Mountain", reportTo: "" },
                { image: "images/peak_4082.png", agency: "", description: "peak", azimuth: "", distance: "", geographicName: "Pk 4082", reportTo: "" },
                { image: "images/redwood_mtn.png", agency: "", description: "mountain", azimuth: "", distance: "", geographicName: "Redwood Mountain", reportTo: "" },
                { image: "images/shadequarter_lookout.png", agency: "", description: "lookout tower", azimuth: "", distance: "", geographicName: "Shadequarter Lookout", reportTo: "" },
                { image: "images/silver_tank.png", agency: "", description: "silver tank", azimuth: "", distance: "", geographicName: "Silver tank (Squaw Valley)", reportTo: "" },
                { image: "images/stone_chimneys.png", agency: "", description: "stone chimneys", azimuth: "", distance: "", geographicName: "stone chimneys", reportTo: "" },
                { image: "images/todd_eymann_cell_tower.png", agency: "", description: "cell tower", azimuth: "", distance: "", geographicName: "Todd Eymann cell tower", reportTo: "" },
                { image: "images/wonder_valley.png", agency: "", description: "valley", azimuth: "", distance: "", geographicName: "Wonder Valley (Elwood Rd)", reportTo: "" },
                { image: "images/patterson_bluffs.jpg", agency: "", description: "cliffs", azimuth: "", distance: "", geographicName: "Patterson Bluffs", reportTo: "" },
                { image: "images/bear_mtn_fresno.png", agency: "", description: "mountain", azimuth: "", distance: "", geographicName: "Bear Mountain (Fresno)", reportTo: "" },
                { image: "images/shaw_ave.png", agency: "", description: "Street", azimuth: "", distance: "", geographicName: "Shaw Ave", reportTo: "" },
                { image: "images/clarence_king.png", agency: "", description: "peak", azimuth: "", distance: "", geographicName: "Mt. Clarence King", reportTo: "" },
            ],
            "Park Ridge": [
                { image: "images/mitchell_peak.png", agency: "SQF", description: "Mountain top", azimuth: "87° 30'", distance: "13.2 mi", geographicName: "Mitchell Peak", reportTo: "Porterville" },
                { image: "images/bear_mtn_tuu.png", agency: "SRA", description: "Mountain", azimuth: "169° 30'", distance: "10.25 mi", geographicName: "Bear Mountain (Tulare)", reportTo: "Porterville" },

            ],
            "Buck Rock": [
                { image: "images/obelisk.png", agency: "SNF", description: "Rocky crag", azimuth: "1.5° ", distance: "12 mi", geographicName: "Obelisk", reportTo: "Sierra" },
                { image: "images/mt_brewer.png", agency: "SEKI", description: "Mountain", azimuth: "96° ", distance: "25 mi", geographicName: "Mt. Brewer", reportTo: "Ash Mtn?" }
            ]
        };

        let currentIndex = 0;
        let isRandomMode = false;
        let answerRevealed = false;
        let selectedOption = -1;
        let currentRandomIndex = 0; // Track current item in random mode
        let currentLookout = "Delilah"; // Track current lookout
        let currentLookoutData = []; // Store current lookout data

        // Initialize the quiz
        function initializeQuiz() {
            setCurrentLookoutData();
            document.getElementById('lookoutSelect').value = currentLookout
            updatePageCounter();
            loadCurrentItem();
            updateNavigationButtons();
        }

        // Set current lookout data
        function setCurrentLookoutData() {
            currentLookoutData = quizData[currentLookout] || [];
        }

        // Get current item index based on mode
        function getCurrentItemIndex() {
            if (isRandomMode) {
                return currentRandomIndex;
            }
            return currentIndex;
        }

        // Load current quiz item
        function loadCurrentItem() {
            const itemIndex = getCurrentItemIndex();
            const item = currentLookoutData[itemIndex];
            
            if (!item) {
                console.error('No item found at index:', itemIndex, 'for lookout:', currentLookout);
                return;
            }
            
            const image = document.getElementById('quizImage');
            const loadingText = document.getElementById('loadingText');
            
            // Show loading text
            loadingText.style.display = 'block';
            image.style.display = 'none';
            
            // Load image
            image.src = item.image;
            image.onload = function() {
                loadingText.style.display = 'none';
                image.style.display = 'block';
            };
            
            // Update info section
            document.getElementById('infoDescription').textContent = item.description;
            document.getElementById('infoAzimuth').textContent = item.azimuth;
            document.getElementById('infoDistance').textContent = item.distance;
            
            // Reset answer state
            resetAnswer();
        }

        // Update page counter
        function updatePageCounter() {
            const counter = document.getElementById('pageCounter');
            if (isRandomMode) {
                counter.textContent = `${currentRandomIndex + 1}/${currentLookoutData.length}`;
            } else {
                counter.textContent = `${currentIndex + 1}/${currentLookoutData.length}`;
            }
        }

        // Update navigation buttons
        function updateNavigationButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            // In random mode or with wraparound, buttons are always enabled
            prevBtn.disabled = false;
            nextBtn.disabled = false;
        }

        // Select option (for user interaction)
        function selectOption(optionIndex) {
            if (answerRevealed) return;
            selectedOption = optionIndex;
        }

        // Reveal the correct answer
        function revealAnswer() {
            const itemIndex = getCurrentItemIndex();
            const item = currentLookoutData[itemIndex];
            
            if (!item) {
                console.error('No item found for revealing answer');
                return;
            }
            
            // Show correct answer
            const correctAnswerDiv = document.getElementById('correctAnswer');
            correctAnswerDiv.innerHTML = `Geographic Name: ${item.geographicName}<br>Agency: ${item.agency}<br>Report to: ${item.reportTo}`;
            correctAnswerDiv.style.display = 'block';
            
            // Update button visibility
            document.getElementById('revealBtn').style.display = 'none';
            document.getElementById('resetBtn').style.display = 'inline-block';
            
            answerRevealed = true;
        }

        // Reset answer display
        function resetAnswer() {
            // Clear all radio buttons
            const radios = document.querySelectorAll('input[name="agency"]');
            radios.forEach(radio => radio.checked = false);
            
            // Clear geographic name input
            document.getElementById('commonNameInput').value = '';
            
            // Clear report to checkboxes
            const reportToCheckboxes = document.querySelectorAll('input[name="reportTo"]');
            reportToCheckboxes.forEach(checkbox => checkbox.checked = false);
            
            // Hide correct answer
            document.getElementById('correctAnswer').style.display = 'none';
            
            // Reset selected option
            selectedOption = -1;
            
            // Update button visibility
            document.getElementById('revealBtn').style.display = 'inline-block';
            document.getElementById('resetBtn').style.display = 'none';
            
            answerRevealed = false;
        }

        // Navigate to next item
        function nextItem() {
            if (isRandomMode) {
                currentRandomIndex = Math.floor(Math.random() * currentLookoutData.length);
                updatePageCounter();
                loadCurrentItem();
            } else {
                currentIndex++;
                if (currentIndex >= currentLookoutData.length) {
                    currentIndex = 0; // Wrap around to first item
                }
                updatePageCounter();
                loadCurrentItem();
                updateNavigationButtons();
            }
        }

        // Navigate to previous item
        function previousItem() {
            if (isRandomMode) {
                currentRandomIndex = Math.floor(Math.random() * currentLookoutData.length);
                updatePageCounter();
                loadCurrentItem();
            } else {
                currentIndex--;
                if (currentIndex < 0) {
                    currentIndex = currentLookoutData.length - 1; // Wrap around to last item
                }
                updatePageCounter();
                loadCurrentItem();
                updateNavigationButtons();
            }
        }

        // Toggle between sequential and random mode
        function toggleMode() {
            const checkbox = document.getElementById('randomizeCheckbox');
            isRandomMode = checkbox.checked;
            
            if (isRandomMode) {
                // When switching to random mode, generate a random index
                currentRandomIndex = Math.floor(Math.random() * currentLookoutData.length);
            } else {
                // When switching to sequential mode, set currentIndex to match the current random item
                currentIndex = currentRandomIndex;
            }
            
            updatePageCounter();
            loadCurrentItem();
            updateNavigationButtons();
        }

        // Change lookout selection
        function changeLookout() {
            const select = document.getElementById('lookoutSelect');
            currentLookout = select.value;
            
            // Reset to first item when changing lookout
            currentIndex = 0;
            currentRandomIndex = 0;
            
            // Set data for new lookout
            setCurrentLookoutData();
            
            // Update display
            updatePageCounter();
            loadCurrentItem();
            updateNavigationButtons();
        }

        // Initialize the quiz when page loads
        window.addEventListener('load', initializeQuiz);

        // Add keyboard navigation
        document.addEventListener('keydown', function(event) {
            switch(event.key) {
                case 'ArrowLeft':
                    if (!document.getElementById('prevBtn').disabled) {
                        previousItem();
                    }
                    break;
                case 'ArrowRight':
                    if (!document.getElementById('nextBtn').disabled) {
                        nextItem();
                    }
                    break;
            }
        });
    </script>
</body>
</html>

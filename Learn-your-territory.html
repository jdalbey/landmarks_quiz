<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn Your Territory</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; padding: 1rem; background: #f5f5f5; }
    h1 { font-size: 18px; font-weight: 500; margin-bottom: 0.5rem; color: #222; }
    #instructions { font-size: 13px; color: #666; margin-bottom: 10px; line-height: 1.6; }
    #wrapper { position: relative; display: inline-block; width: 100%; user-select: none; }
    #landscape { display: block; width: 100%; height: auto; }
    #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: crosshair; }

    /* ── Modal overlay ───────────────────────────────────────────────────── */
    #modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      z-index: 1000;
      /* Backdrop fades in; the image inside does the zoom */
      animation: backdropIn 0.25s ease forwards;
    }
    #modal-backdrop.visible { display: flex; align-items: center; justify-content: center; }

    @keyframes backdropIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    #modal-content {
      position: relative;
      max-width: 90vw;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    #modal-img {
      display: block;
      max-width: 100%;
      max-height: 80vh;
      border-radius: 4px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      /* Scale-only zoom animation, origin set dynamically via JS */
      transform-origin: center center;
      animation: zoomIn 0.35s cubic-bezier(0.2, 0, 0.2, 1) forwards;
    }

    @keyframes zoomIn {
      from { transform: scale(0.04); opacity: 0.6; }
      to   { transform: scale(1);    opacity: 1;   }
    }

    #modal-caption {
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      letter-spacing: 0.02em;
    }

    #modal-close {
      position: absolute;
      top: -14px;
      right: -14px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-size: 16px;
      line-height: 28px;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s;
    }
    #modal-close:hover { background: rgba(255,255,255,0.3); }
  </style>
</head>
<body>

  <h1>Learn Your Territory</h1>
  <p id="instructions">Hover near a line or landmark to highlight it. Click to toggle the label. Double-click to view a closeup.</p>

  <div id="wrapper">
    <!--
      OPTION A (current): generated canvas placeholder.
      OPTION B (your photo): replace the <canvas> with:
        <img id="landscape" src="your-photo.jpg" alt="Landscape">
      and remove the drawLandscape() call below.
    -->
    <img id="landscape" src="images/DelilahAfternoonWest.jpg" alt="Landscape">
    <svg id="overlay" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <!-- ── Closeup modal ─────────────────────────────────────────────────── -->
  <div id="modal-backdrop" role="dialog" aria-modal="true" aria-label="Landmark closeup">
    <div id="modal-content">
      <button id="modal-close" aria-label="Close">✕</button>
      <img id="modal-img" src="" alt="">
      <div id="modal-caption"></div>
    </div>
  </div>

  <script>
    // -------------------------------------------------------------------------
    // CONFIGURATION — edit these values to match your photo and landmarks
    // -------------------------------------------------------------------------

    // Native pixel dimensions of your photograph
    const IMAGE_NATIVE_WIDTH  = 1711;
    const IMAGE_NATIVE_HEIGHT = 752;

    // Landmark data. All coordinates are in native image pixels, exactly as
    // reported by your image editor (Photoshop, GIMP, Preview, etc.).
    //
    // x1, y1  — top end of the line (undecorated, label appears above here)
    // x2, y2  — bottom end of the line (dot or arrow, points to the land feature)
    // label   — name displayed when the user clicks the line
    // hidden  — true  → land feature is not directly visible (canyon, valley, etc.)
    //                    tip is drawn as an arrowhead
    //           false → land feature is visible; tip is drawn as a filled dot
    // closeup — path to a closeup photo of this landmark (relative to this HTML file)
    //           double-click the line to open the closeup in a modal overlay
    //           set to null (no quotes) to disable the closeup for a landmark
    const landmarks = [
      { id:1, x1:230,  y1:60, x2:230,  y2:375, label: "Dude Ridge/SQF",          hidden: false, closeup: "images/closeups/DudeRidge.png"    },
      { id:2, x1:525,  y1:60, x2:525,  y2:390, label: "Squaw Valley (area)/FKU", hidden: false, closeup: "images/closeups/SquawValley.png"   },
      { id:3, x1:862,  y1:60, x2:862,  y2:286, label: "Bald Mt/FKU",             hidden: false, closeup: "images/closeups/BaldMt.png"        },
      { id:4, x1:1200, y1:60, x2:1200, y2:190, label: "Bear Mt/FKU",             hidden: false, closeup: "images/closeups/bear_mtn_fresno.jpg"        },
      { id:5, x1:1293, y1:60, x2:1293, y2:324, label: "Elwood Rd/FKU",           hidden: true,  closeup: "images/closeups/Elwood.png"      },
      { id:6, x1:1660, y1:60, x2:1660, y2:240, label: "Dalton Mt",               hidden: false, closeup: "images/closeups/Dalton.png"      },
      //{ id:, x1:, y1:, x2:, y2:, label: "", hidden: false, closeup: null },
    ];

    // Pixel distance from the pointer within which a line is considered hovered
    const HOVER_DIST = 12;

    // -------------------------------------------------------------------------
    // Pre-compute fractional coordinates for responsive scaling
    // -------------------------------------------------------------------------
    landmarks.forEach(lm => {
      lm._x1f = lm.x1 / IMAGE_NATIVE_WIDTH;
      lm._y1f = lm.y1 / IMAGE_NATIVE_HEIGHT;
      lm._x2f = lm.x2 / IMAGE_NATIVE_WIDTH;
      lm._y2f = lm.y2 / IMAGE_NATIVE_HEIGHT;
    });

    const W = IMAGE_NATIVE_WIDTH, H = IMAGE_NATIVE_HEIGHT;
    // -------------------------------------------------------------------------
    // SVG overlay — interaction logic
    // -------------------------------------------------------------------------
    const svg = document.getElementById('overlay');
    const NS = 'http://www.w3.org/2000/svg';

    let svgW = W, svgH = H;
    let lines = [], labels = [];
    let activeId = -1;
    let shownLabels = new Set();

    function sp(frac, dim) { return frac * dim; }

    function buildSVG() {
      svg.innerHTML = '';
      svg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);
      lines = []; labels = [];

      // Arrowhead marker definitions — one for default (black), one for hover (white)
      const defs = document.createElementNS(NS, 'defs');

      function makeMarker(id, color) {
        const marker = document.createElementNS(NS, 'marker');
        marker.setAttribute('id', id);
        marker.setAttribute('markerWidth',  '8');
        marker.setAttribute('markerHeight', '6');
        marker.setAttribute('refX',  '8');
        marker.setAttribute('refY',  '3');
        marker.setAttribute('orient', 'auto');
        const path = document.createElementNS(NS, 'path');
        path.setAttribute('d', 'M0,0 L8,3 L0,6 Z');
        path.setAttribute('fill', color);
        marker.appendChild(path);
        return marker;
      }

      defs.appendChild(makeMarker('arrow-dark',  'rgba(0,0,0,0.8)'));
      defs.appendChild(makeMarker('arrow-light', 'rgba(255,255,255,0.95)'));
      svg.appendChild(defs);

      landmarks.forEach(lm => {
        const x1 = sp(lm._x1f, svgW), y1 = sp(lm._y1f, svgH);
        const x2 = sp(lm._x2f, svgW), y2 = sp(lm._y2f, svgH);

        // Invisible wide hit-target line for easy mouse/touch selection
        const hitLine = document.createElementNS(NS, 'line');
        hitLine.setAttribute('x1', x1); hitLine.setAttribute('y1', y1);
        hitLine.setAttribute('x2', x2); hitLine.setAttribute('y2', y2);
        hitLine.setAttribute('stroke', 'transparent');
        hitLine.setAttribute('stroke-width', '20');
        hitLine.style.cursor = 'pointer';
        hitLine.dataset.lid = lm.id;
        svg.appendChild(hitLine);

        // Visible annotation line.
        // For arrow landmarks, stop the line a few px short so the arrowhead
        // sits flush at x2,y2 rather than overlapping it.
        const ARROW_INSET = 8;
        const lineX2 = lm.hidden ? x2 - (x2 === x1 ? 0 : ARROW_INSET) : x2;
        const lineY2 = lm.hidden ? y2 - (y2  > y1  ? ARROW_INSET : -ARROW_INSET) : y2;

        const line = document.createElementNS(NS, 'line');
        line.setAttribute('x1', x1); line.setAttribute('y1', y1);
        line.setAttribute('x2', lineX2); line.setAttribute('y2', lineY2);
        line.setAttribute('stroke', 'rgba(0,0,0,0.8)');
        line.setAttribute('stroke-width', '1.5');
        if (lm.hidden) line.setAttribute('marker-end', 'url(#arrow-dark)');
        line.style.pointerEvents = 'none';
        svg.appendChild(line);
        lines.push({ line, id: lm.id, hidden: lm.hidden });

        // Tip symbol: dot for visible landmarks, arrowhead for hidden ones.
        // (Arrow landmarks get their tip from the SVG marker on the line.)
        if (!lm.hidden) {
          const dot = document.createElementNS(NS, 'circle');
          dot.setAttribute('cx', x2); dot.setAttribute('cy', y2);
          dot.setAttribute('r', '3');
          dot.setAttribute('fill', 'rgba(0,0,0,0.8)');
          dot.dataset.lid = lm.id;
          dot.style.pointerEvents = 'none';
          svg.appendChild(dot);
        }

        // Label group (hidden until clicked)
        const labelG = document.createElementNS(NS, 'g');
        labelG.style.pointerEvents = 'none';
        labelG.style.display = shownLabels.has(lm.id) ? 'block' : 'none';

        const bg = document.createElementNS(NS, 'rect');
        bg.setAttribute('rx', '3');
        bg.setAttribute('fill', 'rgba(0,0,0,0.65)');

        // Text baseline sits 6px above the top of the line so label clears the line
        const text = document.createElementNS(NS, 'text');
        text.setAttribute('x', x1);
        text.setAttribute('y', y1 - 6);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('dominant-baseline', 'auto');
        text.setAttribute('font-size', '12');
        text.setAttribute('font-family', 'sans-serif');
        text.setAttribute('fill', 'white');
        text.setAttribute('font-weight', '500');
        text.textContent = lm.label;

        labelG.appendChild(bg);
        labelG.appendChild(text);
        svg.appendChild(labelG);
        labels.push({ g: labelG, bg, text, id: lm.id });
      });

      requestAnimationFrame(sizeLabels);
    }

    function sizeLabels() {
      labels.forEach(lb => {
        try {
          const bb = lb.text.getBBox();
          const pad = 5;
          lb.bg.setAttribute('x',      bb.x - pad);
          lb.bg.setAttribute('y',      bb.y - pad);
          lb.bg.setAttribute('width',  bb.width  + pad * 2);
          lb.bg.setAttribute('height', bb.height + pad * 2);
        } catch(e) {}
      });
    }

    function setActive(id) {
      if (activeId === id) return;
      activeId = id;
      lines.forEach(({ line, id: lid, hidden }) => {
        const isActive = lid === id;
        const strokeColor = isActive ? 'rgba(255,255,255,0.95)' : 'rgba(0,0,0,0.8)';
        line.setAttribute('stroke', strokeColor);
        line.setAttribute('stroke-width', isActive ? '2.5' : '1.5');
        if (hidden) {
          line.setAttribute('marker-end', isActive ? 'url(#arrow-light)' : 'url(#arrow-dark)');
        } else {
          const dot = svg.querySelector(`circle[data-lid="${lid}"]`);
          if (dot) dot.setAttribute('fill', strokeColor);
        }
      });
    }

    function getPos(e) {
      const rect = svg.getBoundingClientRect();
      const src  = e.touches ? e.touches[0] : e;
      return {
        x: (src.clientX - rect.left) * (svgW / rect.width),
        y: (src.clientY - rect.top)  * (svgH / rect.height),
      };
    }

    function distToSegment(px, py, x1, y1, x2, y2) {
      const dx = x2-x1, dy = y2-y1, lenSq = dx*dx + dy*dy;
      if (lenSq === 0) return Math.hypot(px-x1, py-y1);
      const t = Math.max(0, Math.min(1, ((px-x1)*dx + (py-y1)*dy) / lenSq));
      return Math.hypot(px - (x1 + t*dx), py - (y1 + t*dy));
    }

    function findClosest(mx, my) {
      let best = -1, bestDist = Infinity;
      landmarks.forEach(lm => {
        const x1 = sp(lm._x1f, svgW), y1 = sp(lm._y1f, svgH);
        const x2 = sp(lm._x2f, svgW), y2 = sp(lm._y2f, svgH);
        const d  = distToSegment(mx, my, x1, y1, x2, y2);
        if (d < HOVER_DIST && d < bestDist) { bestDist = d; best = lm.id; }
      });
      return best;
    }

    function onMove(e) {
      e.preventDefault();
      const { x, y } = getPos(e);
      setActive(findClosest(x, y));
    }

    function onTap(e) {
      e.preventDefault();
      const { x, y } = getPos(e);
      const id = findClosest(x, y);
      if (id === -1) return;
      shownLabels.has(id) ? shownLabels.delete(id) : shownLabels.add(id);
      const lb = labels.find(l => l.id === id);
      if (lb) {
        lb.g.style.display = shownLabels.has(id) ? 'block' : 'none';
        requestAnimationFrame(sizeLabels);
      }
    }

    function getRealSize() {
      const rect = svg.getBoundingClientRect();
      svgW = rect.width  || W;
      svgH = rect.height || H;
    }

    // -------------------------------------------------------------------------
    // Modal closeup — open / close
    // -------------------------------------------------------------------------
    const backdrop  = document.getElementById('modal-backdrop');
    const modalImg  = document.getElementById('modal-img');
    const modalCap  = document.getElementById('modal-caption');
    const modalClose= document.getElementById('modal-close');

    function openModal(lm, originX, originY) {
      if (!lm.closeup) return;

      // Convert the landmark's screen position to a percentage of the viewport
      // so transform-origin zooms outward from exactly that point.
      const xPct = (originX / window.innerWidth  * 100).toFixed(2) + '%';
      const yPct = (originY / window.innerHeight * 100).toFixed(2) + '%';
      modalImg.style.transformOrigin = `${xPct} ${yPct}`;

      modalImg.src = lm.closeup;
      modalImg.alt = lm.label;
      modalCap.textContent = lm.label;

      // Re-trigger the CSS animation by removing and re-adding the element's
      // animation (clone trick keeps it simple without a class toggle).
      modalImg.style.animation = 'none';
      // Force reflow so removing the animation takes effect before restoring it
      void modalImg.offsetWidth;
      modalImg.style.animation = '';

      backdrop.classList.add('visible');
      document.addEventListener('keydown', onKeyDown);
    }

    function closeModal() {
      backdrop.classList.remove('visible');
      document.removeEventListener('keydown', onKeyDown);
      // Clear src after transition so the old image doesn't flash on next open
      setTimeout(() => { modalImg.src = ''; }, 300);
    }

    function onKeyDown(e) { if (e.key === 'Escape') closeModal(); }

    modalClose.addEventListener('click', closeModal);
    backdrop.addEventListener('click', e => { if (e.target === backdrop) closeModal(); });

    // -------------------------------------------------------------------------
    // Double-click (desktop) — open closeup modal
    // -------------------------------------------------------------------------
    function onDblClick(e) {
      const { x, y } = getPos(e);
      const id = findClosest(x, y);
      if (id === -1) return;
      const lm = landmarks.find(l => l.id === id);
      if (lm) openModal(lm, e.clientX, e.clientY);
    }

    // -------------------------------------------------------------------------
    // Double-tap (touch) — detected manually via timing
    // -------------------------------------------------------------------------
    let lastTap = 0;
    let lastTapId = -1;

    function onTouchStart(e) {
      const now = Date.now();
      const { x, y } = getPos(e);
      const id = findClosest(x, y);

      if (now - lastTap < 350 && id !== -1 && id === lastTapId) {
        // Double-tap detected on the same landmark
        e.preventDefault();
        const touch = e.touches[0] || e.changedTouches[0];
        const lm = landmarks.find(l => l.id === id);
        if (lm) openModal(lm, touch.clientX, touch.clientY);
        lastTap = 0; lastTapId = -1;
        return;
      }

      lastTap   = now;
      lastTapId = id;
      // Fall through to the existing onTap handler for single-tap label toggle
      onTap(e);
    }

    svg.addEventListener('mousemove',   onMove);
    svg.addEventListener('mouseleave',  () => setActive(-1));
    svg.addEventListener('click',       onTap);
    svg.addEventListener('dblclick',    onDblClick);
    svg.addEventListener('touchmove',   onMove,        { passive: false });
    svg.addEventListener('touchstart',  onTouchStart,  { passive: false });
    window.addEventListener('resize',   () => { getRealSize(); shownLabels = new Set(); buildSVG(); });

    // Build the SVG once the photo has loaded and the browser knows its
    // rendered dimensions. If the image is already cached and 'load' has
    // already fired, call buildSVG() immediately.
    const img = document.getElementById('landscape');
    function init() { getRealSize(); buildSVG(); }
    if (img.complete) { init(); } else { img.addEventListener('load', init); }
  </script>
</body>
</html>
